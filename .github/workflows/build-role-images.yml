name: Build Coworld role images

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/build-role-images.yml"
      - "grader/**"
  push:
    branches: [master]
    paths:
      - ".github/workflows/build-role-images.yml"
      - "grader/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: grader
            image: metta-ai/coworld-planet-wars-grader
            context: ./grader
            file: ./grader/graders/bitworld_score/bitworld_score_grader/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/${{ matrix.image }}"
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAGS="${REPO}:pr-${{ github.event.number }}"
          else
            TAGS="${REPO}:latest,${REPO}:master-${SHORT_SHA}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
